<svg xmlns="http://www.w3.org/2000/svg" viewBox="33 25 438 400" width="438" height="400" role="img" aria-labelledby="title desc">
  <title id="title">Cute MCP Goat logo</title>
  <desc id="desc">A cute goat head with circuit nodes and an MCP badge, designed as a small repo logo icon.</desc>

  <defs>
    <style>
      .stroke { stroke: #0f2940; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
      .fill-cream { fill: #fcfbf7; }
      .fill-horn { fill: #d8b07b; }
      .fill-ear { fill: #f6b2ab; }
      .fill-node { fill: #8ebdff; }
      .fill-dark { fill: #0f2940; }
      .fill-chip { fill: #132d45; }
      .fill-soft { fill: #c9b59b; }
      .text-chip { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 42px; font-weight: 700; }
    </style>
  </defs>

  <!-- circuit arms -->
  <g class="stroke" fill="none">
    <path d="M180 334 H124 V290" />
    <path d="M168 370 H110" />
    <path d="M190 334 L215 358" />

    <path d="M332 334 H388 V290" />
    <path d="M344 370 H402" />
    <path d="M322 334 L297 358" />
  </g>

  <!-- nodes -->
  <g class="stroke">
    <circle cx="124" cy="290" r="18" class="fill-node" />
    <circle cx="110" cy="370" r="18" class="fill-node" />
    <circle cx="388" cy="290" r="18" class="fill-node" />
    <circle cx="402" cy="370" r="18" class="fill-node" />
  </g>

  <!-- horns behind head -->
  <g class="stroke">
    <path class="fill-horn" d="M198 127 C180 73, 171 55, 151 42 C187 39, 223 76, 230 137 Z"/>
    <path class="fill-horn" d="M314 127 C332 73, 341 55, 361 42 C325 39, 289 76, 282 137 Z"/>
    <path d="M173 68 C189 76, 202 94, 208 114" />
    <path d="M160 88 C177 96, 193 112, 199 134" />
    <path d="M339 68 C323 76, 310 94, 304 114" />
    <path d="M352 88 C335 96, 319 112, 313 134" />
  </g>

  <!-- ears -->
  <g class="stroke">
    <path class="fill-cream" d="M153 172 C102 158, 72 170, 47 194 C65 222, 109 236, 155 215 Z"/>
    <path class="fill-ear" d="M139 184 C105 181, 84 191, 67 208 C89 220, 114 221, 141 208 Z"/>

    <path class="fill-cream" d="M359 172 C410 158, 440 170, 465 194 C447 222, 403 236, 357 215 Z"/>
    <path class="fill-ear" d="M373 184 C407 181, 428 191, 445 208 C423 220, 398 221, 371 208 Z"/>
  </g>

  <!-- head -->
  <g class="stroke">
    <circle cx="256" cy="212" r="121" class="fill-cream" />
    <path class="fill-cream" d="M225 104 C236 89, 258 84, 276 93 C290 100, 298 116, 295 130 C287 124, 277 124, 268 127 C265 112, 248 104, 225 104 Z" />
  </g>

  <!-- face -->
  <g>
    <ellipse cx="212" cy="212" rx="19" ry="25" class="fill-dark" />
    <ellipse cx="300" cy="212" rx="19" ry="25" class="fill-dark" />
    <circle cx="219" cy="204" r="6" fill="#ffffff" />
    <circle cx="307" cy="204" r="6" fill="#ffffff" />

    <path class="stroke fill-dark" d="M239 252 C246 242, 266 242, 273 252 C270 264, 242 264, 239 252 Z" />
    <path class="stroke" fill="none" d="M256 258 V282" />
    <path class="stroke" fill="none" d="M256 282 C245 293, 229 293, 220 281" />
    <path class="stroke" fill="none" d="M256 282 C267 293, 283 293, 292 281" />
  </g>

  <!-- beard -->
  <path class="stroke fill-cream" d="M225 317 C228 341, 244 356, 256 366 C268 356, 284 341, 287 317 C278 322, 271 329, 266 338 C262 332, 259 326, 256 321 C253 326, 250 332, 246 338 C241 329, 234 322, 225 317 Z"/>

  <!-- chip -->
  <g>
    <rect x="185" y="342" width="142" height="74" rx="20" class="fill-chip stroke" />
    <text x="256" y="388" text-anchor="middle" class="text-chip">MCP</text>
  </g>
</svg>
